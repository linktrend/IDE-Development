entries:
  - id: commands-index
    path: .cursor/commands/INDEX.yaml
    purpose: Progressive-disclosure index for discovering preferred execution commands and retained compatibility wrappers.
    when_to_use:
      - when a task begins from a command-style invocation
      - when entering the commands directory directly
    underlying_prompt: none
    required_doctrine:
      - .cursor/README.md
    required_templates: []
    required_agents: []
    expected_output:
      - routing into active, legacy, or deprecated command wrappers
    status: active
    tags:
      - navigation
      - index
      - progressive-disclosure

  - id: commands-readme
    path: .cursor/commands/README.md
    purpose: Directory-level navigation note for selecting preferred execution commands and avoiding legacy wrappers by default.
    when_to_use:
      - when entering the commands directory directly
      - when a runtime needs a lightweight overview before selecting a command wrapper
    underlying_prompt: none
    required_doctrine:
      - .cursor/README.md
      - .cursor/commands/INDEX.yaml
    required_templates: []
    required_agents: []
    expected_output:
      - routing into the preferred command surface
      - awareness of legacy and deprecated compatibility commands
    status: active
    tags:
      - navigation
      - index-entry
      - progressive-disclosure

  - id: plan-program
    path: .cursor/commands/plan-program.md
    purpose: Preferred command wrapper for turning validated intent into a program artifact and initial module structure.
    when_to_use:
      - when planning a new program
      - when a user says "Plan this program"
    underlying_prompt: .cursor/prompts/execution/PLAN-PROGRAM.md
    required_doctrine:
      - .cursor/execution/INDEX.yaml
      - .cursor/execution/CANONICAL-LAWS.md
      - .cursor/execution/MINIMUM-RUNTIME-MODEL.md
    required_templates:
      - .cursor/templates/INTENT.md
      - .cursor/templates/PROGRAM.md
      - .cursor/templates/MODULE.md
    required_agents:
      - planner
      - product-owner
      - technical-lead
    expected_output:
      - validated or revised intent
      - program artifact
      - explicit blockers if program creation is not ready
    status: active
    tags:
      - command
      - planning
      - preferred

  - id: plan-module
    path: .cursor/commands/plan-module.md
    purpose: Preferred command wrapper for decomposing a module into phases and issues suitable for autonomous execution.
    when_to_use:
      - when planning a module
      - when a user says "Plan this module"
    underlying_prompt: .cursor/prompts/execution/PLAN-MODULE.md
    required_doctrine:
      - .cursor/execution/INDEX.yaml
      - .cursor/execution/MINIMUM-RUNTIME-MODEL.md
      - .cursor/execution/AUTONOMOUS-MODULE-EXECUTION.md
    required_templates:
      - .cursor/templates/MODULE.md
      - .cursor/templates/PHASE.md
      - .cursor/templates/ISSUE.md
    required_agents:
      - planner
      - product-owner
      - technical-lead
    expected_output:
      - module artifact
      - phase artifacts
      - issue artifacts with dependencies and acceptance criteria
    status: active
    tags:
      - command
      - planning
      - module
      - preferred

  - id: complete-module
    path: .cursor/commands/complete-module.md
    purpose: Preferred command wrapper for recursive module execution through readiness, proof, review, and integration.
    when_to_use:
      - when executing a module to completion
      - when a user says "Complete this module"
    underlying_prompt: .cursor/prompts/execution/COMPLETE-MODULE.md
    required_doctrine:
      - .cursor/execution/INDEX.yaml
      - .cursor/execution/MINIMUM-RUNTIME-MODEL.md
      - .cursor/execution/AUTONOMOUS-MODULE-EXECUTION.md
    required_templates:
      - .cursor/templates/MODULE.md
      - .cursor/templates/PHASE.md
      - .cursor/templates/ISSUE.md
      - .cursor/templates/PROOF.md
      - .cursor/templates/REVIEW.md
      - .cursor/templates/INTEGRATION.md
    required_agents:
      - orchestrator
      - reviewer
      - integrator
      - technical-lead
    expected_output:
      - completed module or explicit blocked state
      - issue proof, review, and integration artifacts
      - module-level review and integration where applicable
    status: active
    tags:
      - command
      - execution
      - module
      - preferred

  - id: execute-issue
    path: .cursor/commands/execute-issue.md
    purpose: Preferred command wrapper for atomic issue execution up to mandatory review handoff.
    when_to_use:
      - when executing a single ready issue
      - when a user says "Execute this issue"
    underlying_prompt: .cursor/prompts/execution/EXECUTE-ISSUE.md
    required_doctrine:
      - .cursor/execution/INDEX.yaml
      - .cursor/execution/MINIMUM-RUNTIME-MODEL.md
    required_templates:
      - .cursor/templates/ISSUE.md
      - .cursor/templates/PROOF.md
      - .cursor/templates/REVIEW.md
      - .cursor/templates/INTEGRATION.md
    required_agents:
      - frontend-developer
      - backend-developer
      - ui-ux-designer
      - qa-automation-engineer
    expected_output:
      - executed issue work
      - proof artifact
      - state transition to review_ready or blocked
    status: active
    tags:
      - command
      - execution
      - issue
      - preferred

  - id: review-issue
    path: .cursor/commands/review-issue.md
    purpose: Preferred command wrapper for independent issue review against proof and acceptance criteria.
    when_to_use:
      - when an issue reaches review_ready
      - when a user says "Review this issue"
    underlying_prompt: .cursor/prompts/execution/REVIEW-ISSUE.md
    required_doctrine:
      - .cursor/execution/INDEX.yaml
      - .cursor/execution/CANONICAL-LAWS.md
      - .cursor/execution/MINIMUM-RUNTIME-MODEL.md
    required_templates:
      - .cursor/templates/ISSUE.md
      - .cursor/templates/PROOF.md
      - .cursor/templates/REVIEW.md
    required_agents:
      - reviewer
      - qa-automation-engineer
      - technical-lead
    expected_output:
      - review verdict
      - findings and next action
    status: active
    tags:
      - command
      - review
      - issue
      - preferred

  - id: integrate-issue
    path: .cursor/commands/integrate-issue.md
    purpose: Preferred command wrapper for recording accepted issue work as integrated and recomputing downstream readiness.
    when_to_use:
      - after a passing issue review
      - when a user says "Integrate this issue"
    underlying_prompt: .cursor/prompts/execution/INTEGRATE-ISSUE.md
    required_doctrine:
      - .cursor/execution/INDEX.yaml
      - .cursor/execution/MINIMUM-RUNTIME-MODEL.md
    required_templates:
      - .cursor/templates/ISSUE.md
      - .cursor/templates/REVIEW.md
      - .cursor/templates/INTEGRATION.md
    required_agents:
      - integrator
      - orchestrator
      - technical-lead
    expected_output:
      - integration artifact
      - downstream readiness effects
    status: active
    tags:
      - command
      - integration
      - issue
      - preferred

