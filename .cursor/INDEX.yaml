entries:
  - id: cursor-adapter-index
    path: .cursor/INDEX.yaml
    purpose: Adapter index for the Cursor compatibility runtime surface.
    when_to_read:
      - when entering .cursor directly
      - when a runtime needs to understand the relationship between .cursor and core
    dependencies:
      - .cursor/README.md
      - .cursor/rules/00-linkdev-bootstrap.mdc
      - .cursor/session/INDEX.yaml
      - .cursor/workspace/INDEX.yaml
      - core/
    consumers:
      - Cursor
      - Codex
      - Claude
      - human operators
    status: active
    tags:
      - adapter
      - compatibility
      - navigation

  - id: cursor-readme
    path: .cursor/README.md
    purpose: Primary human-readable entrypoint for the Cursor compatibility runtime surface.
    when_to_read:
      - before reading deeper .cursor layers
      - when using the system through existing .cursor paths
    dependencies:
      - .cursor/INDEX.yaml
      - .cursor/import-core.md
    consumers:
      - Cursor
      - Codex
      - Claude
      - human operators
    status: active
    tags:
      - adapter
      - readme
      - compatibility

  - id: import-core
    path: .cursor/import-core.md
    purpose: Explains how the .cursor compatibility surface maps to the canonical core knowledge asset.
    when_to_read:
      - when maintaining the packaging layout
      - when validating backward compatibility
    dependencies:
      - .cursor/README.md
      - core/reports/V1.0.1-MIGRATION.md
    consumers:
      - maintainers
      - Cursor
      - Codex
      - Claude
    status: active
    tags:
      - adapter
      - packaging
      - migration

  - id: session-adapter
    path: .cursor/session/INDEX.yaml
    purpose: Routes session start, resume, shutdown, and handoff behavior through the compatibility runtime surface.
    when_to_read:
      - when a natural-language session start or end request is received
      - when validating session continuity behavior from .cursor paths
    dependencies:
      - .cursor/bootstrap/SESSION-STARTUP.md
      - .cursor/bootstrap/SESSION-SHUTDOWN.md
    consumers:
      - Cursor
      - Codex
      - Claude
      - human operators
    status: active
    tags:
      - adapter
      - session
      - continuity

  - id: workspace-adapter
    path: .cursor/workspace/INDEX.yaml
    purpose: Routes one-time workspace adoption, legacy cleanup, and consumer repository wiring through the compatibility runtime surface.
    when_to_read:
      - when a natural-language workspace adoption request is received
      - when validating workspace-level installation behavior from .cursor paths
    dependencies:
      - .cursor/bootstrap/PROJECT-BOOTSTRAP.md
      - .cursor/session/INDEX.yaml
    consumers:
      - Cursor
      - Codex
      - Claude
      - human operators
    status: active
    tags:
      - adapter
      - workspace
      - adoption
